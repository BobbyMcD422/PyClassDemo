services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: demoapp
      DATABASE_USER: demo
      DATABASE_PASSWORD: demo
      PYTHONUNBUFFERED: "1"
    volumes:
      # Classroom demo only: this lets the webpage read container output.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: demoapp
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
