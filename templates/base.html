<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Classroom Demo{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <!-- Frontend: this HTML and CSS is what the browser displays. -->
    <header class="site-header">
      <a class="brand" href="{{ url_for('dashboard') }}">Python Class Demo</a>
      <nav>
        {% if session.get("user_id") %}
          <a href="{{ url_for('dashboard') }}">Dashboard</a>
          <a href="{{ url_for('chat') }}">Chat</a>
          <a href="{{ url_for('activity_log') }}">Python activity</a>
          <a href="{{ url_for('logout') }}">Log out</a>
        {% endif %}
      </nav>
    </header>

    <main class="page-shell">
      {% if route_lesson %}
        <aside class="route-banner" aria-label="How this page was created">
          <span class="route-banner-label">This page ran</span>
          <code>URL {{ route_lesson.url }}</code>
          <span class="route-arrow" aria-hidden="true">→</span>
          <code>Python {{ route_lesson.function }}</code>
          <span class="route-arrow" aria-hidden="true">→</span>
          <code>Template {{ route_lesson.template }}</code>
        </aside>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
